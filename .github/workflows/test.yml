---
jobs:
  build-core:
    defaults:
      run:
        shell: bash
    runs-on: windows-latest
    steps:
      - uses: ocaml/setup-ocaml@v3
        with:
          cache-prefix: v2
          ocaml-compiler: 5.3.0
          opam-pin: false
          opam-repositories: |
            default: https://github.com/punchagan/opam-repository.git#fix-conf-libcurl-deps
          save-opam-post-run: true
      - name: Run opam tests
        run: |
          opam list
          opam install conf-pkg-config conf-mingw-w64-curl-x86_64
          opam list
          opam install conf-libcurl
on: [push, workflow_dispatch]
